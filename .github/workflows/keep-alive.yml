name: Keep Supabase project alive

# Supabase free-tier projects auto-pause after 7 days with no API activity.
# Pinging twice a week keeps it well under that threshold even if a run fails.
on:
  schedule:
    - cron: '0 3 * * 0,3'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        env:
          # Same public anon key already committed in js/config.js — safe to
          # use here since access is controlled by RLS, not key secrecy.
          SUPABASE_URL: https://vcokcwnjcwrjisyoazqe.supabase.co
          SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZjb2tjd25qY3dyamlzeW9henFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MDQ1MzMsImV4cCI6MjA5NzI4MDUzM30.IYJP174jcGDFZ2liHg0zcAa1cCAbR-q4VJZWmQB3fvY
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/org?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")
          echo "Supabase responded with HTTP $status"
          if [ "$status" -ge 400 ]; then
            echo "::error::Supabase ping failed with HTTP $status"
            exit 1
          fi
