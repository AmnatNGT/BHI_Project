<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BHI — Border Health Initiative</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--primary:#2E8B57;--primary-strong:#236E44;--primary-soft:#E1F0E8;--accent:#57A777}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:'Sarabun',system-ui,sans-serif;background:#F3F9F5;color:#1F2D26;-webkit-font-smoothing:antialiased;min-height:100vh}
  input,textarea,button,select{font-family:inherit}
  textarea{resize:vertical}
  ::selection{background:var(--primary);color:#fff}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes pop{from{opacity:0;transform:translateY(18px) scale(.98)}to{opacity:1;transform:none}}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#CFE5D8;border-radius:8px}
  /* hover states (replicating the prototype's style-hover) */
  .btn-primary:hover{background:var(--primary-strong)!important}
  .btn-ghost:hover{border-color:var(--primary)!important;color:var(--primary)!important}
  .btn-outline:hover{border-color:var(--primary)!important}
  .card:hover{transform:translateY(-5px);box-shadow:0 20px 40px -20px rgba(30,90,55,.4)}
  .chip-edit:hover{background:#DDEDE3!important}
  .chip-del:hover{background:#FBEAE7!important}
  .add-img:hover{border-color:var(--primary)!important;background:#ECF7F1!important}
  .field:focus{border-color:var(--primary)!important;background:#fff!important}
  .resp-grid{grid-template-columns:1.05fr .95fr}
  @media(max-width:820px){.resp-grid{grid-template-columns:1fr!important;gap:34px!important}.footer-grid{grid-template-columns:1fr!important}}
</style>
</head>
<body>
<div id="app"></div>

<script>
"use strict";
/* ============================================================
   BHI — Border Health Initiative
   Faithful vanilla-JS implementation of BHI.dc.html
   ============================================================ */

const STORE_KEY = 'bhi_site_v3';

const GRADS = [
  'linear-gradient(135deg,#3FB984,#2E8B57)', 'linear-gradient(135deg,#57A777,#2E8B57)',
  'linear-gradient(135deg,#2E8B86,#2E8B57)', 'linear-gradient(135deg,#6FB36A,#3F8F5B)',
  'linear-gradient(135deg,#2E8B57,#1F6E4A)', 'linear-gradient(135deg,#84B86B,#4E9A6B)'
];

const T = {
  nav_home: 'Home', nav_activities: 'Activities', nav_history: 'Our Story', nav_members: 'Our Team',
  admin: 'Admin', view_site: 'View site', logout: 'Log out',
  hero_badge: 'Community health on the border', cta_activities: 'See our activities', cta_about: 'Our story',
  latest_kicker: 'What we do', latest: 'Latest Activities', view_all: 'View all',
  team_kicker: 'Our people', team_title: 'Meet the Team',
  readmore: 'Read more', images: 'photos',
  empty_pub: 'No activities yet', empty_members: 'No team members yet',
  act_title: 'Our Activities', act_sub: 'Everything we have done, newest first',
  hist_kicker: 'Who we are', hist_title: 'Our Story', timeline_title: 'Milestones',
  mem_title: 'Our Team', mem_sub: 'The people making it happen',
  login_title: 'Admin Login', login_sub: 'For organization staff only', login_user: 'Username', login_pass: 'Password',
  login_btn: 'Log in', login_hint: 'Demo — username: admin · password: 1234', login_err: 'Incorrect username or password',
  dash_title: 'Admin Dashboard', dash_orginfo: 'Organization Info', dash_actmgr: 'Manage Activities', dash_memmgr: 'Manage Team', autosave: 'Changes save automatically',
  saved: 'Saved', add_activity: 'Add activity', edit_activity: 'Edit activity', edit: 'Edit', delete: 'Delete', save: 'Save', cancel: 'Cancel',
  f_title: 'Activity title', f_desc: 'Description', f_date: 'Date', f_images: 'Images', f_add: 'Add image',
  f_hint: 'Up to 30 images', f_full: 'Reached the 30-image limit',
  empty_admin: 'No activities yet — tap "Add activity" to start', empty_members_admin: 'No team members yet — tap "Add member".',
  org_short: 'Monogram (logo)', org_namefull: 'Full name', org_tagline: 'Tagline', org_about: 'About',
  org_contact: 'Contact', c_place: 'Working area', c_email: 'Email',
  at_org: 'Organization', at_act: 'Activities', at_hist: 'Our Story', at_mem: 'Our Team',
  hist_story: 'Organization story', m_add: 'Add milestone', m_year: 'Year', m_title: 'Title', m_desc: 'Description',
  mb_add: 'Add member', mb_name: 'Name', mb_role: 'Role', mb_bio: 'Short bio', mb_photo: 'Photo',
  footer_about: 'Join us in bringing health and hope to families along the border', footer_contact: 'Contact', footer_explore: 'Explore', footer_rights: 'All rights reserved',
  confirm_del: 'Delete this activity?', confirm_del_member: 'Remove this team member?', confirm_del_ms: 'Remove this milestone?'
};

/* ---------- defaults / seed data ---------- */
function defaultStory(){
  return 'BHI began in 2017 when a small group of volunteer doctors and nurses started making regular trips to remote villages along the Thai–Myanmar border. What started as occasional clinic visits has grown into year-round programs in primary care, nutrition, clean water and seasonal relief.\n\nWe believe healthcare is a right, not a privilege — and that no family should be left behind simply because of where they live.';
}
function defaultOrg(){
  return {
    short: 'BHI',
    nameFull: { en: 'Border Health Initiative' },
    tagline: { en: 'Health and dignity for every life along the border' },
    about: { en: 'A volunteer-driven organization bringing basic healthcare, medicine and hope to underserved communities along the border.' },
    history: { story: defaultStory() },
    stats: { years: 8, people: 12400, villages: 46 },
    contact: { place: 'Thai–Myanmar border, Tak Province', email: 'hello@bhi-foundation.org' }
  };
}
function seedActivities(){
  return [
    { id: 'a1', title: 'Mobile clinic at Huai Nam Khun', desc: 'Our volunteer team carried out basic health check-ups for over 180 villagers, distributed essential medicines and supplies, and offered nutrition guidance for young children and the elderly in the community.', date: '2025-02-15', images: [], createdAt: 1739577600000 },
    { id: 'a2', title: 'Blankets and winter kits before the cold season', desc: 'Delivered blankets, warm clothing and essential supplies to 12 highland villages to ease the cold for families in need as temperatures dropped.', date: '2024-12-08', images: [], createdAt: 1733616000000 },
    { id: 'a3', title: 'Clean water for border schools', desc: 'Installed clean drinking-water filtration systems at three schools, giving more than 400 students access to safe water and reducing waterborne illness.', date: '2024-10-20', images: [], createdAt: 1729382400000 }
  ];
}
function seedMembers(){
  return [
    { id: 'm1', name: 'Dr. Somchai Phromma', role: 'Founder & Director', bio: 'Family physician who started BHI after years of volunteer trips to border clinics.', photo: '' },
    { id: 'm2', name: 'Naree Kittisak', role: 'Medical Lead', bio: 'Registered nurse coordinating mobile health units and patient triage.', photo: '' },
    { id: 'm3', name: 'Anan Wongchai', role: 'Field Coordinator', bio: 'Plans logistics and works hand-in-hand with village leaders across Tak.', photo: '' },
    { id: 'm4', name: 'Lin Maung', role: 'Community Liaison', bio: 'Translator and trusted bridge to migrant communities along the border.', photo: '' }
  ];
}
function seedMilestones(){
  return [
    { id: 'ms1', year: '2017', title: 'BHI is founded', desc: 'A small group of volunteer doctors and nurses begins regular clinic visits to remote border villages.' },
    { id: 'ms2', year: '2019', title: 'First mobile health unit', desc: 'Launched a fully equipped mobile unit, reaching more than 20 villages each year.' },
    { id: 'ms3', year: '2021', title: 'Clean water program', desc: 'Began installing water filtration systems in border schools.' },
    { id: 'ms4', year: '2024', title: '12,000+ people reached', desc: 'Cumulative care milestone across health, nutrition and seasonal relief.' }
  ];
}

/* ---------- state ---------- */
function loadInitial(){
  const ui = {
    view: 'home', adminTab: 'activities', loggedIn: false,
    login: { user: '', pass: '' }, loginErr: false,
    formOpen: false, editingId: null,
    form: { title: '', desc: '', date: '', images: [] },
    detailOpen: false, detailId: null, di: 0,
    orgSaved: false
  };
  let data = null;
  try { data = JSON.parse(localStorage.getItem(STORE_KEY)); } catch (e) {}
  if (!data) { try { const old = JSON.parse(localStorage.getItem('bhi_site_v2')); if (old && old.org) data = old; } catch (e) {} }
  if (!data || !data.org) data = {};
  const org = data.org || defaultOrg();
  if (!org.history) org.history = { story: defaultStory() };
  if (!org.stats) org.stats = defaultOrg().stats;
  if (!org.contact) org.contact = defaultOrg().contact;
  return Object.assign(ui, {
    org,
    activities: data.activities || seedActivities(),
    members: data.members || seedMembers(),
    milestones: data.milestones || seedMilestones()
  });
}

let state = loadInitial();
let savedTimer = null;

function persist(){
  try { localStorage.setItem(STORE_KEY, JSON.stringify({ org: state.org, activities: state.activities, members: state.members, milestones: state.milestones })); } catch (e) {}
}
function flashSaved(){
  state.orgSaved = true; render();
  clearTimeout(savedTimer);
  savedTimer = setTimeout(() => { state.orgSaved = false; render(); }, 1600);
}

/* ---------- helpers ---------- */
function esc(s){ return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function attr(s){ return esc(s).replace(/"/g,'&quot;'); }
function bg(url){ return "background-image:url('" + String(url).replace(/'/g,"%27") + "');background-size:cover;background-position:center"; }
function today(){ return new Date().toISOString().slice(0,10); }
function fmtDate(iso){ if(!iso) return ''; const d=new Date(iso); if(isNaN(d.getTime())) return iso; try{ return d.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}); }catch(e){ return iso; } }
function initials(name){ const parts=(name||'').trim().split(/\s+/).filter(Boolean); if(!parts.length) return '—'; let p=parts; if(parts[0].toLowerCase().replace('.','')==='dr') p=parts.slice(1); return (p.slice(0,2).map(w=>w[0]).join('')||parts[0][0]).toUpperCase(); }
function excerpt(d){ d=d||''; return d.length>120 ? d.slice(0,120).trim()+'…' : d; }
function setPath(obj, path, val){ const p=path.split('.'); let o=obj; for(let i=0;i<p.length-1;i++) o=o[p[i]]; o[p[p.length-1]]=val; }
function sortedActivities(){ return state.activities.slice().sort((a,b)=> String(b.date||'').localeCompare(String(a.date||'')) || (b.createdAt||0)-(a.createdAt||0)); }

/* ---------- image resize (mirrors prototype) ---------- */
function resize(file){
  return new Promise(res => {
    const fr = new FileReader();
    fr.onload = () => {
      const img = new Image();
      img.onload = () => {
        const max = 1280; let w = img.width, h = img.height;
        if (w > max || h > max) { const r = Math.min(max/w, max/h); w = Math.round(w*r); h = Math.round(h*r); }
        const c = document.createElement('canvas'); c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        try { res(c.toDataURL('image/jpeg', 0.82)); } catch (err) { res(fr.result); }
      };
      img.onerror = () => res(fr.result);
      img.src = fr.result;
    };
    fr.onerror = () => res(''); fr.readAsDataURL(file);
  });
}

/* ============================================================
   ACTIONS
   ============================================================ */
const App = {
  // nav
  goHome(){ state.view='home'; render(); },
  goActivities(){ state.view='activities'; render(); },
  goHistory(){ state.view='history'; render(); },
  goMembers(){ state.view='members'; render(); },
  goAdmin(){ state.view='admin'; render(); },
  adminToOrg(){ state.adminTab='org'; render(); },
  adminToActs(){ state.adminTab='activities'; render(); },
  adminToHist(){ state.adminTab='history'; render(); },
  adminToMem(){ state.adminTab='members'; render(); },

  // login
  onLoginInput(el){ state.login[el.dataset.path]=el.value; state.loginErr=false; },
  onLogin(){ const {user,pass}=state.login; if(user.trim()==='admin'&&pass==='1234'){ state.loggedIn=true; state.loginErr=false; state.login={user:'',pass:''}; } else { state.loginErr=true; } render(); },
  onLoginKey(e){ if(e.key==='Enter') App.onLogin(); },
  logout(){ state.loggedIn=false; state.view='home'; render(); },

  // org
  onOrgInput(el){ setPath(state.org, el.dataset.path, el.value); persist(); flashSaved(); },

  // activities
  openAdd(){ state.formOpen=true; state.editingId=null; state.form={title:'',desc:'',date:today(),images:[]}; render(); },
  openEdit(id){ const a=state.activities.find(x=>x.id===id); if(!a) return; state.formOpen=true; state.editingId=id; state.form={title:a.title,desc:a.desc,date:a.date,images:(a.images||[]).slice()}; render(); },
  closeForm(){ state.formOpen=false; render(); },
  onFormInput(el){ state.form[el.dataset.path]=el.value; if(el.dataset.path==='title') updateSaveBtn(); },
  removeFormImage(i){ state.form.images=state.form.images.filter((_,idx)=>idx!==i); render(); },
  onPickImages(el){
    const files=Array.from(el.files||[]); el.value='';
    const remaining=30-state.form.images.length; const take=files.slice(0,Math.max(0,remaining));
    Promise.all(take.map(f=>resize(f))).then(urls=>{ state.form.images=state.form.images.concat(urls.filter(Boolean)); render(); });
  },
  saveActivity(){
    const f=state.form; if(!f.title.trim()) return;
    if(state.editingId){ state.activities=state.activities.map(a=>a.id===state.editingId?Object.assign({},a,{title:f.title,desc:f.desc,date:f.date,images:f.images}):a); }
    else { state.activities.push({id:'a'+Date.now(),title:f.title,desc:f.desc,date:f.date||today(),images:f.images,createdAt:Date.now()}); }
    state.formOpen=false; persist(); render();
  },
  deleteActivity(id){ if(!window.confirm(T.confirm_del)) return; state.activities=state.activities.filter(a=>a.id!==id); persist(); render(); },

  // members
  onMemberInput(el){ const i=+el.dataset.idx,f=el.dataset.field; state.members[i]=Object.assign({},state.members[i],{[f]:el.value}); persist(); flashSaved(); },
  onMemberPhoto(el){ const i=+el.dataset.idx; const file=(el.files||[])[0]; el.value=''; if(!file) return; resize(file).then(url=>{ state.members[i]=Object.assign({},state.members[i],{photo:url}); persist(); render(); }); },
  addMember(){ state.members=state.members.concat([{id:'m'+Date.now(),name:'',role:'',bio:'',photo:''}]); persist(); render(); },
  removeMember(i){ if(!window.confirm(T.confirm_del_member)) return; state.members=state.members.filter((_,idx)=>idx!==i); persist(); render(); },

  // milestones
  onMilestoneInput(el){ const i=+el.dataset.idx,f=el.dataset.field; state.milestones[i]=Object.assign({},state.milestones[i],{[f]:el.value}); persist(); flashSaved(); },
  addMilestone(){ state.milestones=state.milestones.concat([{id:'ms'+Date.now(),year:'',title:'',desc:''}]); persist(); render(); },
  removeMilestone(i){ if(!window.confirm(T.confirm_del_ms)) return; state.milestones=state.milestones.filter((_,idx)=>idx!==i); persist(); render(); },

  // detail
  openDetail(id){ state.detailOpen=true; state.detailId=id; state.di=0; render(); },
  closeDetail(){ state.detailOpen=false; render(); },
  detailPrev(){ const a=state.activities.find(x=>x.id===state.detailId); const n=a&&a.images?a.images.length:0; if(n<2) return; state.di=(state.di-1+n)%n; render(); },
  detailNext(){ const a=state.activities.find(x=>x.id===state.detailId); const n=a&&a.images?a.images.length:0; if(n<2) return; state.di=(state.di+1)%n; render(); },
  detailGo(i){ state.di=i; render(); }
};

/* live-enable the Save button without re-rendering (preserves focus) */
function updateSaveBtn(){
  const btn=document.getElementById('saveActivityBtn'); if(!btn) return;
  const valid=state.form.title.trim().length>0;
  btn.disabled=!valid;
  btn.style.background=valid?'var(--primary)':'#B9D6C5';
  btn.style.cursor=valid?'pointer':'not-allowed';
}

/* ============================================================
   STYLE SNIPPETS
   ============================================================ */
function navTab(on){ return "padding:8px 13px;border:none;background:"+(on?'var(--primary-soft)':'transparent')+";color:"+(on?'var(--primary-strong)':'#3a4d44')+";font-size:14px;font-weight:"+(on?'600':'500')+";cursor:pointer;border-radius:9px"; }
function subTab(on){ return "padding:8px 16px;border:none;background:"+(on?'var(--primary)':'#EAF4EE')+";color:"+(on?'#fff':'#3a4d44')+";font-size:13.5px;font-weight:600;cursor:pointer;border-radius:10px"; }

/* ============================================================
   VIEW FRAGMENTS
   ============================================================ */
function activityCard(a){
  const has=a.images&&a.images.length>0, n=a.images?a.images.length:0;
  const cover=has?bg(a.images[0]):('background:'+GRADS[a._i%GRADS.length]);
  return `
  <article class="card" onclick="App.openDetail('${a.id}')" style="background:#fff;border:1px solid #DCEBE2;border-radius:18px;overflow:hidden;cursor:pointer;box-shadow:0 1px 2px rgba(30,60,40,.04);transition:transform .25s ease,box-shadow .25s ease;display:flex;flex-direction:column">
    <div style="position:relative;height:200px;background:#E8F2EC;${cover}">
      ${!has?`<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center"><span style="font-family:'IBM Plex Sans Thai',sans-serif;font-weight:700;font-size:30px;color:rgba(255,255,255,.92)">${esc(state.org.short)}</span></div>`:''}
      <span style="position:absolute;top:12px;left:12px;background:rgba(255,255,255,.94);backdrop-filter:blur(4px);padding:5px 11px;border-radius:999px;font-size:12px;font-weight:600;color:#3a4d44">${esc(fmtDate(a.date))}</span>
      ${n>1?`<span style="position:absolute;bottom:12px;right:12px;background:rgba(22,46,32,.74);color:#fff;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:600">${n} ${T.images}</span>`:''}
    </div>
    <div style="padding:18px 20px 20px;display:flex;flex-direction:column;gap:8px;flex:1">
      <h3 style="font-family:'IBM Plex Sans Thai',sans-serif;font-weight:600;font-size:19px;margin:0;line-height:1.3">${esc(a.title)}</h3>
      <p style="margin:0;font-size:14.5px;line-height:1.65;color:#5b6e63;flex:1">${esc(excerpt(a.desc))}</p>
      <span style="color:var(--primary);font-weight:600;font-size:14px;margin-top:4px">${T.readmore} →</span>
    </div>
  </article>`;
}

function nav(){
  const v=state.view;
  return `
  <header style="position:sticky;top:0;z-index:50;background:rgba(243,249,245,.85);backdrop-filter:blur(12px);border-bottom:1px solid #DCEBE2">
    <div style="max-width:1180px;margin:0 auto;padding:13px 24px;display:flex;align-items:center;gap:16px">
      <div onclick="App.goHome()" style="display:flex;align-items:center;gap:11px;cursor:pointer">
        <div style="width:42px;height:42px;border-radius:13px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Sans Thai',sans-serif;font-weight:700;font-size:17px;letter-spacing:.5px;box-shadow:0 6px 16px -6px var(--primary)">${esc(state.org.short)}</div>
        <div>
          <div style="font-family:'IBM Plex Sans Thai',sans-serif;font-weight:600;font-size:15px;line-height:1.15">${esc(state.org.nameFull.en)}</div>
          <div style="font-size:11px;color:#6F8479;margin-top:1px">${esc(state.org.tagline.en)}</div>
        </div>
      </div>
      <nav style="margin-left:auto;display:flex;align-items:center;gap:4px">
        <button onclick="App.goHome()" style="${navTab(v==='home')}">${T.nav_home}</button>
        <button onclick="App.goActivities()" style="${navTab(v==='activities')}">${T.nav_activities}</button>
        <button onclick="App.goHistory()" style="${navTab(v==='history')}">${T.nav_history}</button>
        <button onclick="App.goMembers()" style="${navTab(v==='members')}">${T.nav_members}</button>
        <div style="width:1px;height:22px;background:#DCEBE2;margin:0 6px"></div>
        ${v!=='admin'?`<button class="btn-primary" onclick="App.goAdmin()" style="background:var(--primary);color:#fff;padding:9px 16px;border:none;border-radius:10px;font-weight:600;font-size:13.5px;cursor:pointer;white-space:nowrap">${T.admin}</button>`:''}
        ${v==='admin'?`<button onclick="App.goHome()" style="background:transparent;color:var(--primary);padding:8px 13px;border:1px solid var(--primary);border-radius:10px;font-weight:600;font-size:13.5px;cursor:pointer">${T.view_site}</button>`:''}
        ${state.loggedIn?`<button onclick="App.logout()" style="background:transparent;color:#6F8479;padding:8px 12px;border:none;font-size:13.5px;cursor:pointer">${T.logout}</button>`:''}
      </nav>
    </div>
  </header>`;
}

function homeView(){
  const sorted=sortedActivities(); sorted.forEach((a,i)=>a._i=i);
  const tiles=sorted.slice(0,3);
  const preview=sorted.slice(0,3);
  const heroTiles = tiles.map((a,i)=>{
    const has=a.images&&a.images.length>0;
    const cover=has?bg(a.images[0]):('background:'+GRADS[i%GRADS.length]);
    const tileStyle=i===0?'grid-column:1 / -1;height:226px':'height:152px';
    return `
      <div style="position:relative;border-radius:18px;overflow:hidden;background:#E8F2EC;${tileStyle};${cover};box-shadow:0 16px 34px -18px rgba(30,80,55,.45)">
        <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(18,40,28,.62),transparent 56%)"></div>
        <div style="position:absolute;left:14px;right:14px;bottom:12px;color:#fff">
          <div style="font-size:11px;opacity:.88;font-weight:600">${esc(fmtDate(a.date))}</div>
          <div style="font-size:14px;font-weight:600;line-height:1.3;margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${esc(a.title)}</div>
        </div>
      </div>`;
  }).join('');

  return `
  <main>
    <section style="position:relative;overflow:hidden">
      <div style="position:absolute;inset:0;background:radial-gradient(110% 80% at 88% -15%, var(--primary-soft), transparent 58%)"></div>
      <div class="resp-grid" style="max-width:1180px;margin:0 auto;padding:70px 24px 58px;display:grid;gap:50px;align-items:center;position:relative">
        <div style="animation:fadeUp .6s ease both">
          <span style="display:inline-flex;align-items:center;gap:7px;background:#fff;border:1px solid #DCEBE2;color:var(--primary);padding:7px 14px;border-radius:999px;font-size:12.5px;font-weight:600">
            <span style="width:7px;height:7px;border-radius:50%;background:var(--primary)"></span>${T.hero_badge}

          return `
          <div style="background:#fff;border:1px solid #DCEBE2;border-radius:16px;padding:16px;display:flex;gap:16px;align-items:flex-start">
            <label style="width:88px;height:88px;border-radius:14px;flex:none;cursor:pointer;background:#E8F2EC;${av};display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden">
              ${!has?`<span style="font-family:'IBM Plex Sans Thai',sans-serif;font-weight:700;font-size:26px;color:rgba(255,255,255,.92)">${esc(initials(m.name))}</span>`:''}
              <span style="position:absolute;bottom:0;left:0;right:0;background:rgba(18,40,28,.55);color:#fff;font-size:10px;text-align:center;padding:3px">${T.mb_photo}</span>
              <input type="file" accept="image/*" data-idx="${i}" onchange="App.onMemberPhoto(this)" style="display:none">
            </label>
            <div style="flex:1;display:flex;flex-direction:column;gap:9px;min-width:0">
              <input class="field" value="${attr(m.name)}" data-idx="${i}" data-field="name" onchange="App.onMemberInput(this)" placeholder="${attr(T.mb_name)}" style="width:100%;padding:9px 11px;border:1px solid #D2E5D9;border-radius:9px;font-size:14.5px;font-weight:600;background:#F7FBF9;outline:none">
              <input class="field" value="${attr(m.role)}" data-idx="${i}" data-field="role" onchange="App.onMemberInput(this)" placeholder="${attr(T.mb_role)}" style="width:100%;padding:9px 11px;border:1px solid #D2E5D9;border-radius:9px;font-size:14px;background:#F7FBF9;outline:none">
              <textarea class="field" data-idx="${i}" data-field="bio" onchange="App.onMemberInput(this)" rows="2" placeholder="${attr(T.mb_bio)}" style="width:100%;padding:9px 11px;border:1px solid #D2E5D9;border-radius:9px;font-size:14px;background:#F7FBF9;outline:none;line-height:1.6">${esc(m.bio)}</textarea>
            </div>
            <button onclick="App.removeMember(${i})" style="background:transparent;color:#C0392B;border:1px solid #F0D5CF;width:34px;height:34px;border-radius:9px;cursor:pointer;font-size:14px;flex:none">✕</button>
          </div>`;
        }).join('')}
      </div>
      ${!state.members.length?`<div style="text-align:center;padding:40px 20px;background:#fff;border:1px dashed #CFE5D8;border-radius:16px;color:#8aa093;font-size:14px;margin-top:12px">${T.empty_members_admin}</div>`:''}
    </div>`;

  let panel='';
  if(tab==='org') panel=orgPanel;
  else if(tab==='activities') panel=actsPanel;
  else if(tab==='history') panel=histPanel;
  else if(tab==='members') panel=memPanel;

  return `
  <section style="max-width:1140px;margin:0 auto;padding:34px 24px 90px">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:20px">
      <div>
        <h1 style="font-family:'IBM Plex Sans Thai',sans-serif;font-weight:700;font-size:28px;margin:0">${T.dash_title}</h1>
        <p style="color:#6F8479;font-size:14px;margin:5px 0 0">${esc(state.org.nameFull.en)}</p>
      </div>
      ${state.orgSaved?`<span style="display:inline-flex;align-items:center;gap:7px;background:#DBF0E4;color:#27704a;padding:8px 14px;border-radius:999px;font-size:13px;font-weight:600;animation:fadeIn .2s ease both">✓ ${T.saved}</span>`:''}
    </div>
    <div style="display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;border-bottom:1px solid #DCEBE2;padding-bottom:16px">
      <button onclick="App.adminToOrg()" style="${subTab(tab==='org')}">${T.at_org}</button>
      <button onclick="App.adminToActs()" style="${subTab(tab==='activities')}">${T.at_act}</button>
      <button onclick="App.adminToHist()" style="${subTab(tab==='history')}">${T.at_hist}</button>
      <button onclick="App.adminToMem()" style="${subTab(tab==='members')}">${T.at_mem}</button>
    </div>
    ${panel}
  </section>`;
}

function formModal(){
  const imgCount=state.form.images.length;
  const valid=state.form.title.trim().length>0;
  const saveBtnStyle="padding:12px 26px;border:none;border-radius:12px;font-weight:600;font-size:14.5px;color:#fff;background:"+(valid?'var(--primary)':'#B9D6C5')+";cursor:"+(valid?'pointer':'not-allowed');
  const imgs=state.form.images.map((src,i)=>`
    <div style="position:relative;aspect-ratio:1;border-radius:12px;overflow:hidden;border:1px solid #DCEBE2;${bg(src)}">
      <button onclick="App.removeFormImage(${i})" style="position:absolute;top:4px;right:4px;width:24px;height:24px;border-radius:8px;background:rgba(18,40,28,.72);color:#fff;border:none;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center">✕</button>
    </div>`).join('');
  const addTile=imgCount<30?`
    <label class="add-img" style="aspect-ratio:1;border:1.5px dashed #BCD9C8;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;color:var(--primary);background:#F4FBF7">
      <span style="font-size:22px;line-height:1">＋</span>
      <span style="font-size:11px;font-weight:600">${T.f_add}</span>
      <input type="file" accept="image/*" multiple onchange="App.onPickImages(this)" style="display:none">
    </label>`:'';
  return `
  <div onclick="App.closeForm()" style="position:fixed;inset:0;z-index:120;background:rgba(18,40,28,.55);backdrop-filter:blur(6px);display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow:auto;animation:fadeIn .2s ease both">
    <div onclick="event.stopPropagation()" style="background:#fff;border-radius:22px;width:100%;max-width:600px;padding:30px;box-shadow:0 40px 80px -30px rgba(20,40,25,.5);animation:pop .35s ease both">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:22px">
        <h3 style="font-family:'IBM Plex Sans Thai',sans-serif;font-weight:700;font-size:21px;margin:0">${state.editingId?T.edit_activity:T.add_activity}</h3>
        <button onclick="App.closeForm()" style="background:#EAF4EE;border:none;width:34px;height:34px;border-radius:10px;cursor:pointer;color:#3a4d44;font-size:18px">✕</button>
      </div>
      <div style="margin-bottom:16px">
        <label style="display:block;font-size:12.5px;font-weight:600;color:#6F8479;margin:0 0 6px">${T.f_title}</label>
        <input class="field" value="${attr(state.form.title)}" data-path="title" oninput="App.onFormInput(this)" placeholder="${attr(T.f_title)}" style="width:100%;padding:11px 13px;border:1px solid #D2E5D9;border-radius:11px;font-size:15px;background:#F7FBF9;outline:none">
      </div>
      <div style="margin-bottom:16px">
        <label style="display:block;font-size:12.5px;font-weight:600;color:#6F8479;margin:0 0 6px">${T.f_date}</label>
        <input class="field" type="date" value="${attr(state.form.date)}" data-path="date" onchange="App.onFormInput(this)" style="width:100%;padding:11px 13px;border:1px solid #D2E5D9;border-radius:11px;font-size:15px;background:#F7FBF9;outline:none">
      </div>
      <div style="margin-bottom:18px">
        <label style="display:block;font-size:12.5px;font-weight:600;color:#6F8479;margin:0 0 6px">${T.f_desc}</label>
        <textarea class="field" data-path="desc" oninput="App.onFormInput(this)" rows="4" placeholder="${attr(T.f_desc)}" style="width:100%;padding:11px 13px;border:1px solid #D2E5D9;border-radius:11px;font-size:15px;background:#F7FBF9;outline:none;line-height:1.65">${esc(state.form.desc)}</textarea>
      </div>
      <div style="margin-bottom:22px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <label style="font-size:12.5px;font-weight:600;color:#6F8479">${T.f_images}</label>
          <span style="font-size:12px;color:#8aa093">${imgCount} / 30</span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:10px">
          ${imgs}${addTile}
        </div>
        <div style="font-size:12px;color:#8aa093;margin-top:8px">${imgCount>=30?T.f_full:T.f_hint}</div>
      </div>
      <div style="display:flex;gap:12px;justify-content:flex-end">
        <button onclick="App.closeForm()" style="background:#fff;color:#3a4d44;border:1px solid #D2E5D9;padding:12px 22px;border-radius:12px;font-weight:600;font-size:14.5px;cursor:pointer">${T.cancel}</button>
        <button id="saveActivityBtn" onclick="App.saveActivity()" ${valid?'':'disabled'} style="${saveBtnStyle}">${T.save}</button>
      </div>
    </div>
  </div>`;
}

function detailModal(){
  const da=state.activities.find(x=>x.id===state.detailId);
  if(!da) return '';
  const sorted=sortedActivities();
  const idx=sorted.findIndex(x=>x.id===da.id);
  const imgs=da.images||[]; const has=imgs.length>0;
  const di=Math.min(state.di,Math.max(0,imgs.length-1));
  const curStyle=has?bg(imgs[di]):('background:'+GRADS[(idx<0?0:idx)%GRADS.length]);
  const multi=imgs.length>1;
  const thumbs=imgs.map((src,i)=>`
    <div onclick="App.detailGo(${i})" style="width:66px;height:66px;border-radius:11px;cursor:pointer;${bg(src)};${i===di?'outline:3px solid var(--primary);outline-offset:1px':'opacity:.7'}"></div>`).join('');
  return `
  <div onclick="App.closeDetail()" style="position:fixed;inset:0;z-index:110;background:rgba(16,32,22,.66);backdrop-filter:blur(7px);display:flex;align-items:center;justify-content:center;padding:24px;animation:fadeIn .2s ease both">
    <div onclick="event.stopPropagation()" style="background:#fff;border-radius:22px;max-width:840px;width:100%;max-height:90vh;overflow:auto;box-shadow:0 40px 90px -30px rgba(16,32,18,.6);animation:pop .35s ease both">
      <div style="position:relative;height:380px;background:#E8F2EC;${curStyle}">
        ${!has?`<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center"><span style="font-family:'IBM Plex Sans Thai',sans-serif;font-weight:700;font-size:46px;color:rgba(255,255,255,.92)">${esc(state.org.short)}</span></div>`:''}
        <button onclick="App.closeDetail()" style="position:absolute;top:14px;right:14px;width:38px;height:38px;border-radius:11px;background:rgba(255,255,255,.92);border:none;cursor:pointer;font-size:17px;color:#3a4d44;display:flex;align-items:center;justify-content:center">✕</button>
        ${multi?`
          <button onclick="event.stopPropagation();App.detailPrev()" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.92);border:none;cursor:pointer;font-size:18px;color:#3a4d44">‹</button>
          <button onclick="event.stopPropagation();App.detailNext()" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.92);border:none;cursor:pointer;font-size:18px;color:#3a4d44">›</button>`:''}
      </div>
      <div style="padding:26px 30px 30px">
        <span style="display:inline-block;background:var(--primary-soft);color:var(--primary);padding:5px 13px;border-radius:999px;font-size:12.5px;font-weight:600">${esc(fmtDate(da.date))}</span>
        <h2 style="font-family:'IBM Plex Sans Thai',sans-serif;font-weight:700;font-size:26px;margin:14px 0 0;line-height:1.25">${esc(da.title)}</h2>
        <p style="font-size:15.5px;line-height:1.8;color:#4f6157;margin:14px 0 0;white-space:pre-wrap">${esc(da.desc)}</p>
        ${multi?`<div style="display:flex;gap:9px;margin-top:22px;flex-wrap:wrap">${thumbs}</div>`:''}
      </div>
    </div>
  </div>`;
}

/* ============================================================
   RENDER
   ============================================================ */
function render(){
  const v=state.view;
  let body='';
  if(v==='home') body=homeView();
  else if(v==='activities') body=activitiesView();
  else if(v==='history') body=historyView();
  else if(v==='members') body=membersView();
  else if(v==='admin') body = state.loggedIn ? dashView() : loginView();

  const isPublic = v==='home'||v==='activities'||v==='history'||v==='members';

  let html = `<div style="min-height:100vh">` + nav() + body;
  if(isPublic) html += footer();
  html += `</div>`;
  if(state.formOpen) html += formModal();
  if(state.detailOpen) html += detailModal();

  document.getElementById('app').innerHTML = html;
}

render();
</script>
</body>
</html>
